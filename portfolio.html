    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --text-color: #334155;
            --bg-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-color); overflow-x: hidden; }

        /* NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .navbar-brand { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; color: var(--primary-color) !important; display: flex; align-items: center; gap: 10px; }
        .navbar-brand i { color: var(--accent-color); }
        .navbar .btn { border-radius: 50px; padding: 10px 24px; font-weight: 600; transition: all 0.3s ease; }
        .btn-outline-dark { border: 2px solid var(--primary-color); color: var(--primary-color); }
        .btn-outline-dark:hover { background: var(--primary-color); color: white; transform: translateY(-2px); }
        .btn-dark { background: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-dark:hover { background: var(--accent-color); border-color: var(--accent-color); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        /* PORTFOLIO HERO */
        .portfolio-header {
            padding: 180px 20px 80px;
            background: linear-gradient(135deg, rgba(15,23,42,1) 0%, rgba(30,41,59,1) 100%);
            color: white;
            text-align: center;
        }

        .portfolio-header h1 { font-size: 4rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .portfolio-header p { font-size: 1.2rem; color: rgba(255,255,255,0.8); max-width: 700px; margin: auto; }

        /* GALLERY GRID */
        .gallery-page { padding: 80px 0 120px; }
        
        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            aspect-ratio: 4/5;
            background: #000;
        }

        .gallery-item video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; opacity: 0.9; }
        .gallery-item:hover video { transform: scale(1.05); opacity: 1; }

        /* FOOTER & WHATSAPP */
        footer { background: #080c16; color: rgba(255,255,255,0.5); text-align: center; padding: 30px; font-size: 0.9rem; }
        .whatsapp { position: fixed; right: 30px; bottom: 30px; width: 65px; height: 65px; background: #25D366; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 2.2rem; text-decoration: none; z-index: 1000; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4); transition: all 0.3s ease; animation: pulse 2s infinite; }
        .whatsapp:hover { transform: translateY(-5px); background: #20b858; color: white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
    </style>
</head>
